name: Update Flake Lock

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 UTC に実行
  workflow_dispatch: # 手動実行も可能

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - id: discover
        uses: ./.github/actions/discover-flake-inputs

  update:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        input-name: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: ./.github/actions/update-flake-input
        with:
          input-name: ${{ matrix.input-name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          minimum-release-age-days: 3
          auto-merge: true
