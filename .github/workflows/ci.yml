name: CI

on:
  pull_request:
    branches: [main]

# 同じブランチの重複実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 変更検出ジョブ（後続ジョブのスキップ判定に使用）
  changes:
    runs-on: ubuntu-latest
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'home/**'
              - 'config/**'
              - '.github/workflows/**'
            shell:
              - 'scripts/**'
              - 'config/**/*.sh'

  # 軽量チェック（shellcheck）
  lint:
    needs: changes
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: find scripts config -name "*.sh" | xargs shellcheck

  # Nixビルド（キャッシュ付き）
  build:
    needs: changes
    if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      # flake.lock のハッシュをキーに Nix ストアをキャッシュ
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5368709120  # 5GB

      - name: Check flake syntax and inputs
        run: nix flake check

      - name: Build Home Manager configuration
        run: nix build .#homeConfigurations.ryosh.activationPackage --print-build-logs
