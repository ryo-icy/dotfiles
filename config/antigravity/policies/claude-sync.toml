# Claude CLI の設定を同期した Antigravity CLI ポリシー

# ==========================================
# 拒否ルール (Deny) - 優先度 300
# ==========================================

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git reset"
decision = "deny"
priority = 300
denyMessage = "git reset は禁止されています。"

[[rule]]
toolName = "run_shell_command"
commandPrefix = "rtk git reset"
decision = "deny"
priority = 300
denyMessage = "git reset は禁止されています。"

[[rule]]
toolName = "run_shell_command"
commandPrefix = "op "
decision = "deny"
priority = 300

[[rule]]
toolName = "run_shell_command"
argsPattern = "cat .*\.env.*"
decision = "deny"
priority = 301

[[rule]]
toolName = "run_shell_command"
argsPattern = "rtk cat .*\.env.*"
decision = "deny"
priority = 301

[[rule]]
toolName = "run_shell_command"
argsPattern = "cat ~/.kube/config"
decision = "deny"
priority = 301

[[rule]]
toolName = "run_shell_command"
argsPattern = "rtk cat ~/.kube/config"
decision = "deny"
priority = 301

[[rule]]
toolName = "run_shell_command"
commandPrefix = "env"
decision = "deny"
priority = 300
denyMessage = "環境変数の表示は禁止されています。"

[[rule]]
toolName = "run_shell_command"
commandPrefix = "printenv"
decision = "deny"
priority = 300
denyMessage = "環境変数の表示は禁止されています。"

[[rule]]
toolName = "run_shell_command"
commandPrefix = "rm -rf"
decision = "deny"
priority = 300
denyMessage = "セキュリティ上の理由から、再帰的な削除 (rm -rf) は禁止されています。"

[[rule]]
toolName = "run_shell_command"
commandPrefix = "rtk rm -rf"
decision = "deny"
priority = 300
denyMessage = "セキュリティ上の理由から、再帰的な削除 (rm -rf) は禁止されています。"

[[rule]]
toolName = "run_shell_command"
commandPrefix = "sudo "
decision = "deny"
priority = 300
denyMessage = "セキュリティ上の理由から、sudo 権限が必要な操作は禁止されています。"

[[rule]]
toolName = "read_file"
filePattern = ".*\.env.*"
decision = "deny"
priority = 300

[[rule]]
toolName = "read_file"
filePattern = "~/.kube/config"
decision = "deny"
priority = 300

# ==========================================
# 許可ルール (Allow) - 優先度 100
# ==========================================

# git / gh (サンドボックス除外)
